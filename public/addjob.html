<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Add Job</title>

    <link rel="stylesheet" href="css/style.css">

</head>

<body>

    <nav class="navbar">

        <div class="logo">
            JobPortal
        </div>

        <div class="nav-links">

            <a href="index.html">Home</a>
            <a href="jobs.html">Jobs</a>
            <a href="register.html">Register</a>
            <a href="login.html">Login</a>
            <a href="addjob.html">Add Job</a>
            <a href="myapplications.html">Applications</a>

        </div>

    </nav>

    <div class="page-container">

        <div class="form-card">

            <h1>Add New Job</h1>

            <form id="jobForm">

                <input
                type="text"
                id="title"
                placeholder="Job Title"
                required>

                <input
                type="text"
                id="company"
                placeholder="Company Name"
                required>

                <input
                type="text"
                id="location"
                placeholder="Location"
                required>

                <input
                type="text"
                id="salary"
                placeholder="Salary"
                required>

                <button type="submit">
                    Add Job
                </button>

            </form>

        </div>

    </div>

    <script src="js/addjob.js"></script>
    <footer class="footer">

    <h3>JobPortal</h3>

    <p>Find Your Dream Job Easily</p>

    <p>© 2026 All Rights Reserved</p>

</footer>

</body>
</html>
